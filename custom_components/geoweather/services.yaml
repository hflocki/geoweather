update:
  name: Standort & Wetter aktualisieren
  description: >
    Ruft alle DWD-APIs erneut ab (Standort, Warnungen, Pollenflug).
    Wird automatisch ignoriert wenn der GeoWeather fährt (Geschwindigkeit > Schwellenwert)
    oder der GPS-Fix unzureichend ist (Satelliten < Minimum).
    Rufe diesen Service aus einer Automation heraus auf – z. B. wenn sich die
    GPS-Position geändert hat oder in einem festen Zeitintervall.
  fields: {}
