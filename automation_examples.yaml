# ═══════════════════════════════════════════════════════════════════════════════
# GeoWeather v2.4.0 – Automation-Beispiele
# ═══════════════════════════════════════════════════════════════════════════════
#
# Die Integration macht KEINE eigenen Updates mehr.
# Alle Updates werden ausschließlich durch diese Automations gesteuert.
#
# ANPASSEN:
#   - sensor.mein_speed_sensor  → dein Geschwindigkeitssensor
#   - 5.0                       → deine speed_threshold aus der Integration
#
# ═══════════════════════════════════════════════════════════════════════════════

# ── 1. Update nach Ankunft (mit Verzögerung) ──────────────────────────────────
# Wenn man zum Stillstand kommt und X Minuten stehen bleibt → Update auslösen.
# Das ersetzt den alten "arrival_delay" Parameter der Integration.

automation:
  - alias: "GeoWeather – Update nach Ankunft (10 Min Verzögerung)"
    description: >
      Sobald das Fahrzeug stoppt und 10 Minuten stehen bleibt,
      wird ein GeoWeather-Update ausgelöst. Ersetzt den arrival_delay der Integration.
    trigger:
      - platform: numeric_state
        entity_id: sensor.mein_speed_sensor   # <── ANPASSEN
        below: 5.0                            # <── speed_threshold
        for:
          minutes: 10                         # <── gewünschte Wartezeit nach Ankunft
    action:
      - service: geoweather.update

# ── 2. Sofort-Update bei Ankunft (ohne Verzögerung) ──────────────────────────
# Für Anwendungsfälle, bei denen man sofort beim Ankommen updaten will
# (z.B. Ankunft zu Hause für Wetterwarnung).

  - alias: "GeoWeather – Sofort-Update bei Stillstand"
    description: >
      Löst sofort einen Update aus, wenn Geschwindigkeit unter Schwellwert fällt.
      Kein Warten. Für Szenarien wo eine schnelle Reaktion wichtiger ist.
    trigger:
      - platform: numeric_state
        entity_id: sensor.mein_speed_sensor   # <── ANPASSEN
        below: 5.0                            # <── speed_threshold
    action:
      - service: geoweather.update

# ── 3. Periodisches Update im Stand ──────────────────────────────────────────
# Alle 30 Minuten aktualisieren, aber NUR wenn man steht (nicht fährt).
# Das ersetzt den alten "update_interval" Parameter der Integration.

  - alias: "GeoWeather – Periodisches Update im Stand (alle 30 Min)"
    description: >
      Alle 30 Minuten ein Update, aber nur wenn das Fahrzeug steht.
      Ersetzt den internen update_interval der Integration.
    trigger:
      - platform: time_pattern
        minutes: "/30"
    condition:
      - condition: numeric_state
        entity_id: sensor.mein_speed_sensor   # <── ANPASSEN
        below: 5.0                            # <── speed_threshold
    action:
      - service: geoweather.update

# ── 4. Kombination: Ankunft + periodisch ─────────────────────────────────────
# Empfohlene Kombination: Update nach 10 Min Stillstand + alle 60 Min im Stand.

  - alias: "GeoWeather – Update nach Ankunft (10 Min)"
    trigger:
      - platform: numeric_state
        entity_id: sensor.mein_speed_sensor
        below: 5.0
        for:
          minutes: 10
    action:
      - service: geoweather.update

  - alias: "GeoWeather – Stündliches Update im Stand"
    trigger:
      - platform: time_pattern
        minutes: "0"   # jede volle Stunde
    condition:
      - condition: numeric_state
        entity_id: sensor.mein_speed_sensor
        below: 5.0
    action:
      - service: geoweather.update

# ── 5. Update NUR wenn man steht UND zu Hause ist ────────────────────────────

  - alias: "GeoWeather – Update zu Hause (stündlich)"
    trigger:
      - platform: time_pattern
        minutes: "0"
    condition:
      - condition: numeric_state
        entity_id: sensor.mein_speed_sensor
        below: 5.0
      - condition: zone
        entity_id: device_tracker.mein_tracker   # <── ANPASSEN
        zone: zone.home
    action:
      - service: geoweather.update

# ── HINWEIS zum Fahren ────────────────────────────────────────────────────────
# Wenn man fährt: KEINE der obigen Automations feuert (dank "below: 5.0"
# Trigger/Bedingung). Die Integration selbst macht ebenfalls keine Updates.
# → Im Fahrbetrieb werden die Sensoren eingefroren (letzter bekannter Wert).
