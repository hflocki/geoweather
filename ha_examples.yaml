# ═══════════════════════════════════════════════════════════════════════════════
# GeoWeather v2.4.0 – Automation-Beispiele
# ═══════════════════════════════════════════════════════════════════════════════
#
# Die Integration macht KEINE eigenen Updates mehr.
# Alle Updates werden ausschließlich durch diese Automations gesteuert.
#
# ANPASSEN:
#   - sensor.mein_speed_sensor  → dein Geschwindigkeitssensor
#   - 5.0                       → deine speed_threshold aus der Integration
#
# ═══════════════════════════════════════════════════════════════════════════════

# ── 1. Update nach Ankunft (mit Verzögerung) ──────────────────────────────────
# Wenn man zum Stillstand kommt und X Minuten stehen bleibt → Update auslösen.
# Das ersetzt den alten "arrival_delay" Parameter der Integration.

# ── 1. Update nach Ankunft (10 Min Verzögerung) ──────────────────────────────
- alias: "GeoWeather – Update after arrival (10 min delay)"
  description: >
    Triggers a GeoWeather update once the vehicle has been stationary
    (moving sensor off) for 10 minutes.
  trigger:
    - platform: state
      entity_id: binary_sensor.geoweather_moving
      to: "off"
      for:
        minutes: 10
  action:
    - service: geoweather.update

# ── 2. Sofort-Update bei Ankunft (ohne Verzögerung) ──────────────────────────
- alias: "GeoWeather – Immediate update when stopped"
  description: >
    Triggers an update immediately when the moving sensor turns off.
  trigger:
    - platform: state
      entity_id: binary_sensor.geoweather_moving
      to: "off"
  action:
    - service: geoweather.update

# ── 3. Periodisches Update im Stand (alle 30 Min) ────────────────────────────
- alias: "GeoWeather – Periodic update while stationary (every 30 min)"
  description: >
    Update every 30 minutes, but only if the vehicle is currently not moving.
  trigger:
    - platform: time_pattern
      minutes: "/30"
  condition:
    - condition: state
      entity_id: binary_sensor.geoweather_moving
      state: "off"
  action:
    - service: geoweather.update

# ── 4. Kombination: Ankunft + periodisch (Stündlich) ─────────────────────────
- alias: "GeoWeather – Update 10 min after stopping"
  trigger:
    - platform: state
      entity_id: binary_sensor.geoweather_moving
      to: "off"
      for:
        minutes: 10
  action:
    - service: geoweather.update

- alias: "GeoWeather – Hourly update while stationary"
  trigger:
    - platform: time_pattern
      minutes: "0" # Every full hour
  condition:
    - condition: state
      entity_id: binary_sensor.geoweather_moving
      state: "off"
  action:
    - service: geoweather.update

# ── HINWEIS zum Fahren ────────────────────────────────────────────────────────
# Wenn man fährt: KEINE der obigen Automations feuert (dank "below: 5.0"
# Trigger/Bedingung). Die Integration selbst macht ebenfalls keine Updates.
# → Im Fahrbetrieb werden die Sensoren eingefroren (letzter bekannter Wert).

# =============================================================================
# 🌦️ DASHBOARD: REGEN & STANDORT
# =============================================================================

# 1. Vorhersage Niederschlag kombiniert aktuell und  2h (Mushroom Style)
type: custom:mushroom-template-card
primary: |
  {% set s_aktuell = 'sensor.geoweather_niederschlag_aktuell' %}
  {% set s_2h = 'sensor.geoweather_niederschlag_vorhersage_2h' %}

  {% if states(s_aktuell) | float(0) > 0 %}
    Niederschlag: {{ states(s_aktuell) }} mm/h
  {% elif state_attr(s_2h, 'rain_expected') %}
    Regen in {{ state_attr(s_2h, 'next_rain_in_min') }} Min erwartet
  {% else %}
    Aktuell trocken
  {% endif %}
secondary: |
  {% set s_2h = 'sensor.geoweather_niederschlag_vorhersage_2h' %}
  {% set s_legacy = 'sensor.geoweather_niederschlag_vorhersage' %}

  {% if state_attr(s_2h, 'rain_expected') or states(s_aktuell) | float(0) > 0 %}
    Dauer: ~{{ state_attr(s_2h, 'duration_min') }} Min | Max: {{ state_attr(s_2h, 'max_intensity_mmh') }} mm/h
  {% else %}
    Nächste 2 Stunden kein Regen
  {% endif %}
icon: |-
  {% if states('sensor.geoweather_niederschlag_aktuell') | float(0) > 0 %}
    mdi:weather-pouring
  {% else %}
    mdi:weather-rainy
  {% endif %}
icon_color: >-
  {% if states('sensor.geoweather_niederschlag_aktuell') | float(0) > 0 %}
    blue
  {% elif state_attr('sensor.geoweather_niederschlag_vorhersage_2h',
  'rain_expected') %}
    light-blue
  {% else %}
    disabled
  {% endif %}
card_mod:
  style: |
    ha-card {
      {% set entity = 'sensor.geoweather_niederschlag_vorhersage_2h' %}
      {% set forecast = state_attr(entity, 'forecast_steps') %}
      {% if forecast %}
        {% set now_ts = now() | as_timestamp %}
        {% set duration_sec = 7200 %}
        background-image: linear-gradient(90deg, 
          rgba(0,0,0,0) 0%
          {%- for time, value in forecast.items() -%}
            {%- set pos = ((time | as_timestamp - now_ts) / duration_sec * 100) | round(1) -%}
            {%- if pos >= 0 and pos <= 100 -%}
              {%- set opacity = 0.35 if value > 0 else 0 -%}
              {# Farbe wechselt von Hellblau zu Lila bei hoher Intensität #}
              {%- set hue = 200 if value < 1 else 280 -%}
              , hsla({{ hue }}, 80%, 50%, {{ opacity }}) {{ pos }}%
            {%- endif -%}
          {%- endfor -%}
        );
      {% endif %}
    }
grid_options:
  columns: 12
  rows: 1


---
# =============================================================================
# ⚠️ DASHBOARD: WETTERWARNUNGEN
# =============================================================================

# 1. Warnungs-Icon (Dynamische Farbe & Blink-Effekt)
type: custom:button-card
entity: sensor.geoweather_wetterwarnungen_anzahl
name: Wetterwarnung
aspect_ratio: 1/1
show_label: true
label: |
  [[[
    const warnings = entity.attributes.warnungen;
    if (!warnings || warnings.length === 0) return 'Alles ok';
    return warnings[0].ereignis;
  ]]]
icon: >
  [[[ return (parseInt(entity.state) > 0) ? 'mdi:alert-decagram' :
  'mdi:shield-check'; ]]]
styles:
  card:
    - background-color: |
        [[[
          const warnings = entity.attributes.warnungen;
          if (!warnings || warnings.length === 0) return 'var(--card-background-color)';
          const level = warnings[0].schwere_level;
          if (level <= 1) return '#ffeb3b';
          if (level === 2) return '#fb8c00';
          if (level >= 3) return '#e53935';
          return 'var(--card-background-color)';
        ]]]
  icon:
    - animation: >
        [[[ return (parseInt(entity.state) > 0) ? 'blink 2s ease-in-out
        infinite' : 'none'; ]]]


---
# 2. Warnungs-Details (Markdown-Liste)
type: markdown
content: >
  {% set warnungen = state_attr('sensor.geoweather_wetterwarnungen',
  'aktive_warnungen') %}

  {% if warnungen %}
    {% for w in warnungen %}
    ### ⚠️ {{ w.ereignis }} ({{ w.schwere }})
    **{{ w.headline }}**
    *🕒 {{ as_timestamp(w.beginn) | timestamp_custom('%H:%M') }} - {{ as_timestamp(w.ende) | timestamp_custom('%H:%M Uhr') }}*
    > {{ w.beschreibung }}
    ---
    {% endfor %}
  {% else %}
    *Aktuell liegen keine Warnmeldungen vor.*
  {% endif %}

---

# 4. Wind Warnung als Kachel
type: custom:button-card
entity: sensor.geoweather_wind_warnstatus
name: Wind-Sicherheit
show_state: true
show_label: true
label: |
  [[[
    const g = entity.attributes.speed_max || 0;
    return 'Böen: ' + g + ' km/h';
  ]]]
styles:
  card:
    - height: 80px
    - background-color: |
        [[[
          const level = entity.attributes.level || 0;
          if (level == 0) return 'rgba(0,255,0,0.1)';
          if (level <= 2) return 'rgba(255,165,0,0.2)';
          return 'rgba(255,0,0,0.3)';
        ]]]
    - border: |
        [[[
          const level = entity.attributes.level || 0;
          if (level == 0) return '1px solid green';
          if (level <= 2) return '2px solid orange';
          return '3px solid red';
        ]]]

---
# =============================================================================
# 🌸 DASHBOARD: POLLENFLUG
# =============================================================================

# 1. Pollen-Hauptkarte (Gesamtbelastung)
type: custom:button-card
entity: sensor.geoweather_pollenbelastung_gesamt
aspect_ratio: 1/1
name: Pollenflug
show_state: true
state_display: |
  [[[
    const s = parseFloat(entity.state);
    if (s === 0) return 'Keine';
    if (s <= 1.5) return 'Gering';
    if (s <= 2.5) return 'Mittel';
    return 'Stark';
  ]]]
styles:
  card:
    - background-color: |
        [[[
          const val = parseFloat(entity.state);
          if (val <= 1.5) return '#ffeb3b';
          if (val <= 2.5) return '#fb8c00';
          return '#e53935';
        ]]]


